workflows:
  android-native-workflow:
    name: Android Native Workflow
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystores
      vars:
        PACKAGE_NAME: "com.aistudio.gadgetvaluerng.abcxyz"
    scripts:
      - name: Initialize Repository Environment
        script: |
          echo "Preparing Android Native Build environment..."
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64 to debug.keystore..."
            base64 --decode debug.keystore.base64 > debug.keystore 2>/dev/null || base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null || base64 -D -i debug.keystore.base64 -o debug.keystore 2>/dev/null || openssl enc -d -base64 -in debug.keystore.base64 -out debug.keystore
          fi
      - name: Build Application
        script: |
          echo "Building debug APK..."
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
